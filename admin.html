<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Moklet Leadership</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{
            min-height:100vh;font-family:'Plus Jakarta Sans',system-ui,sans-serif;
            display:flex;flex-direction:column;align-items:center;
            background:#0b0b1a;color:#e2e8f0;padding:24px;overflow-x:hidden;position:relative;
        }
        .blob{position:fixed;border-radius:50%;filter:blur(100px);opacity:.4;z-index:0;will-change:transform;pointer-events:none}
        .blob-1{width:480px;height:480px;background:#7c3aed;top:-15%;left:-10%;animation:drift 10s ease-in-out infinite alternate}
        .blob-2{width:360px;height:360px;background:#06b6d4;bottom:-10%;right:-8%;animation:drift 12s ease-in-out infinite alternate-reverse}
        .blob-3{width:260px;height:260px;background:#f43f5e;top:40%;left:55%;animation:drift 14s ease-in-out infinite alternate}
        @keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(30px,20px) scale(1.08)}}
        @keyframes pop{from{opacity:0;transform:translateY(32px) scale(.95)}to{opacity:1;transform:none}}

        .top-bar{
            position:relative;z-index:2;width:100%;max-width:900px;
            display:flex;align-items:center;justify-content:space-between;
            margin-bottom:20px;
        }
        .back-btn{
            display:inline-flex;align-items:center;gap:6px;
            text-decoration:none;color:rgba(255,255,255,.5);
            font-size:.82rem;font-weight:600;padding:8px 14px;border-radius:10px;
            background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
            transition:all .2s;
        }
        .back-btn:hover{background:rgba(255,255,255,.1);color:#e2e8f0}
        .back-btn svg{width:16px;height:16px;fill:currentColor}
        .admin-badge{
            display:inline-flex;align-items:center;gap:6px;
            background:rgba(244,63,94,.15);border:1px solid rgba(244,63,94,.25);
            border-radius:10px;color:#fb7185;font-size:.75rem;font-weight:700;
            padding:6px 14px;
        }

        .panel{
            position:relative;z-index:1;width:100%;max-width:900px;
            animation:pop .7s cubic-bezier(.22,1,.36,1) both;
        }
        .panel-title{font-size:1.4rem;font-weight:800;color:#e2e8f0;margin-bottom:4px;text-align:center}
        .panel-subtitle{font-size:.85rem;color:rgba(255,255,255,.4);margin-bottom:24px;text-align:center}

        /* Stats */
        .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
        .stat{
            background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,.1);border-radius:16px;
            padding:20px 16px;text-align:center;
        }
        .stat-num{font-size:1.8rem;font-weight:800;color:#c4b5fd;line-height:1}
        .stat-label{font-size:.72rem;font-weight:600;color:rgba(255,255,255,.4);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

        /* Toolbar */
        .toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
        .search-input{
            flex:1;min-width:200px;
            background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
            border-radius:12px;padding:10px 16px;
            font-family:inherit;font-size:.85rem;color:#e2e8f0;outline:none;transition:border-color .2s;
        }
        .search-input::placeholder{color:rgba(255,255,255,.25)}
        .search-input:focus{border-color:rgba(124,58,237,.5)}
        .filter-select{
            background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
            border-radius:12px;padding:10px 14px;
            font-family:inherit;font-size:.82rem;color:#e2e8f0;outline:none;
            -webkit-appearance:none;appearance:none;cursor:pointer;
        }
        .filter-select option{background:#1a1a2e;color:#e2e8f0}
        .export-btn{
            display:inline-flex;align-items:center;gap:6px;
            background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);
            border-radius:12px;color:#4ade80;
            font-family:inherit;font-size:.82rem;font-weight:600;
            padding:10px 16px;cursor:pointer;transition:all .2s;
        }
        .export-btn:hover{background:rgba(34,197,94,.2);color:#86efac}
        .refresh-btn{
            display:inline-flex;align-items:center;gap:6px;
            background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.25);
            border-radius:12px;color:#c4b5fd;
            font-family:inherit;font-size:.82rem;font-weight:600;
            padding:10px 16px;cursor:pointer;transition:all .2s;
        }
        .refresh-btn:hover{background:rgba(124,58,237,.2);color:#ddd6fe}

        .setting-btn{
            display:inline-flex;align-items:center;gap:6px;
            background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.25);
            border-radius:12px;color:#fbbf24;
            font-family:inherit;font-size:.82rem;font-weight:600;
            padding:10px 16px;cursor:pointer;transition:all .2s;
        }
        .setting-btn:hover{background:rgba(251,191,36,.2);color:#fde68a}

        /* Tab bar */
        .tab-bar{display:flex;gap:4px;margin-bottom:16px;background:rgba(255,255,255,.04);border-radius:12px;padding:4px}
        .tab-btn{
            flex:1;text-align:center;padding:10px 12px;border-radius:10px;
            font-family:inherit;font-size:.82rem;font-weight:600;
            color:rgba(255,255,255,.4);background:transparent;border:none;
            cursor:pointer;transition:all .2s;
        }
        .tab-btn.active{background:rgba(124,58,237,.2);color:#c4b5fd}
        .tab-btn:hover:not(.active){color:rgba(255,255,255,.6)}
        .tab-content{display:none}
        .tab-content.active{display:block}

        /* Modal */
        .modal-overlay{
            display:none;position:fixed;inset:0;z-index:100;
            background:rgba(0,0,0,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
            justify-content:center;align-items:center;padding:20px;
        }
        .modal-overlay.show{display:flex}
        .modal{
            background:#1a1a2e;border:1px solid rgba(255,255,255,.12);
            border-radius:20px;padding:28px 24px;width:100%;max-width:440px;
            animation:pop .3s cubic-bezier(.22,1,.36,1) both;
        }
        .modal h3{font-size:1.1rem;font-weight:800;color:#e2e8f0;margin-bottom:4px}
        .modal p{font-size:.82rem;color:rgba(255,255,255,.4);margin-bottom:18px}
        .modal label{display:block;font-size:.75rem;font-weight:700;color:rgba(255,255,255,.5);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
        .modal input,.modal select,.modal textarea{
            width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
            border-radius:10px;padding:10px 14px;font-family:inherit;font-size:.85rem;
            color:#e2e8f0;outline:none;margin-bottom:14px;transition:border-color .2s;
        }
        .modal input:focus,.modal select:focus,.modal textarea:focus{border-color:rgba(124,58,237,.5)}
        .modal select option{background:#1a1a2e;color:#e2e8f0}
        .modal-actions{display:flex;gap:10px;margin-top:6px}
        .modal-actions button{
            flex:1;padding:11px;border-radius:10px;font-family:inherit;font-size:.85rem;
            font-weight:600;cursor:pointer;transition:all .2s;border:none;
        }
        .btn-primary{background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#fff}
        .btn-primary:hover{opacity:.85}
        .btn-cancel{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1)!important}
        .btn-cancel:hover{background:rgba(255,255,255,.12);color:#e2e8f0}

        /* Checkin cards */
        .ci-cards{display:grid;gap:10px;margin-top:12px}
        .ci-card{
            display:flex;align-items:center;gap:14px;
            background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
            border-radius:14px;padding:14px 16px;
        }
        .ci-card .ci-date{font-size:.9rem;font-weight:700;color:#e2e8f0;white-space:nowrap}
        .ci-card .ci-desc{flex:1;font-size:.78rem;color:rgba(255,255,255,.4);min-width:0;overflow:hidden;text-overflow:ellipsis}
        .ci-card .ci-status{
            font-size:.68rem;font-weight:700;padding:4px 10px;border-radius:8px;white-space:nowrap;
        }
        .ci-status-aktif{background:rgba(34,197,94,.15);color:#4ade80}
        .ci-status-nonaktif{background:rgba(255,255,255,.06);color:rgba(255,255,255,.3)}
        .ci-del{
            background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2);
            border-radius:8px;color:#fb7185;font-size:.75rem;font-weight:600;
            padding:6px 10px;cursor:pointer;transition:all .2s;font-family:inherit;
        }
        .ci-del:hover{background:rgba(244,63,94,.2);color:#fda4af}
        .ci-count{font-size:.72rem;color:rgba(255,255,255,.3);margin-top:2px}

        /* Table */
        .table-wrap{
            background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,.1);border-radius:18px;
            overflow-x:auto;
        }
        .data-table{width:100%;border-collapse:collapse;font-size:.82rem}
        .data-table th{
            background:rgba(255,255,255,.04);
            padding:12px 14px;text-align:left;
            font-size:.7rem;font-weight:700;color:rgba(255,255,255,.4);
            text-transform:uppercase;letter-spacing:.8px;
            border-bottom:1px solid rgba(255,255,255,.08);
            white-space:nowrap;
        }
        .data-table td{
            padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);
            color:#cbd5e1;vertical-align:middle;
        }
        .data-table tr:hover td{background:rgba(255,255,255,.03)}
        .data-table .avatar-cell{width:36px}
        .data-table .mini-avatar{
            width:28px;height:28px;border-radius:8px;object-fit:cover;
            border:1px solid rgba(124,58,237,.3);
        }
        .data-table .mini-avatar-fallback{
            width:28px;height:28px;border-radius:8px;
            background:linear-gradient(135deg,#7c3aed,#06b6d4);
            display:grid;place-items:center;font-size:11px;font-weight:800;color:#fff;
        }
        .status-ok{color:#4ade80;font-weight:700}
        .status-no{color:rgba(255,255,255,.25);font-weight:600}

        .empty-state{text-align:center;padding:48px 20px;color:rgba(255,255,255,.3)}
        .empty-state .empty-icon{font-size:2.5rem;margin-bottom:12px}
        .empty-state p{font-size:.88rem;line-height:1.6}

        /* Setup instructions */
        .setup-card{
            background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,.1);border-radius:18px;
            padding:32px 28px;text-align:center;max-width:520px;margin:0 auto;
        }
        .setup-card h2{font-size:1.1rem;font-weight:700;color:#fbbf24;margin-bottom:8px}
        .setup-card p{font-size:.85rem;color:rgba(255,255,255,.45);line-height:1.7;margin-bottom:16px}
        .setup-steps{text-align:left;margin:0 auto;max-width:420px}
        .setup-steps li{font-size:.82rem;color:rgba(255,255,255,.55);line-height:1.8;margin-bottom:4px}
        .setup-steps code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:4px;font-size:.78rem;color:#c4b5fd}
        .setup-steps a{color:#7dd3fc}

        /* Auth wall */
        .auth-wall{text-align:center;padding:80px 20px}
        .auth-wall .lock-icon{font-size:3rem;margin-bottom:16px}
        .auth-wall h2{font-size:1.2rem;font-weight:700;color:#fb7185;margin-bottom:8px}
        .auth-wall p{font-size:.88rem;color:rgba(255,255,255,.4);line-height:1.6;margin-bottom:20px}
        .auth-wall a{
            display:inline-flex;align-items:center;gap:8px;
            text-decoration:none;color:#c4b5fd;font-weight:600;font-size:.88rem;
            background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.25);
            border-radius:12px;padding:10px 20px;transition:all .2s;
        }
        .auth-wall a:hover{background:rgba(124,58,237,.25)}

        .footer{position:relative;z-index:1;margin-top:28px;font-size:.7rem;color:rgba(255,255,255,.25);text-align:center}

        @media(max-width:640px){
            .stats{grid-template-columns:1fr}
            .data-table{font-size:.75rem}
            .data-table th,.data-table td{padding:8px 10px}
            .toolbar{flex-direction:column}
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="top-bar">
        <a class="back-btn" href="index.html">
            <svg viewBox="0 0 20 20"><path d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"/></svg>
            Kembali
        </a>
        <span class="admin-badge">🛡️ Admin Panel</span>
    </div>

    <div class="panel" id="mainPanel">
        <!-- Content injected by JS -->
    </div>

    <p class="footer">© 2026 Moklet Leadership &bull; SMK Telkom Malang</p>

    <script src="config.js"></script>
    <script>
        var ADMIN_EMAIL = (typeof MOLESH_CONFIG !== 'undefined') ? MOLESH_CONFIG.ADMIN_EMAIL : 'hadi@smktelkom-mlg.sch.id';
        var API_URL = (typeof MOLESH_CONFIG !== 'undefined') ? MOLESH_CONFIG.APPS_SCRIPT_URL : 'YOUR_APPS_SCRIPT_URL';
        var panel = document.getElementById('mainPanel');
        var allStudents = [];

        /* ── Auth check ── */
        function checkAdmin() {
            var raw = localStorage.getItem('molesh_user');
            if (!raw) { showAuthWall('Kamu belum login.'); return false; }
            try {
                var user = JSON.parse(raw);
                if (user.email !== ADMIN_EMAIL) {
                    showAuthWall('Halaman ini hanya untuk admin (' + ADMIN_EMAIL + ').');
                    return false;
                }
                return true;
            } catch (e) {
                showAuthWall('Session tidak valid.');
                return false;
            }
        }

        function showAuthWall(msg) {
            panel.innerHTML =
                '<div class="auth-wall">' +
                '<div class="lock-icon">🔒</div>' +
                '<h2>Akses Ditolak</h2>' +
                '<p>' + msg + '</p>' +
                '<a href="index.html">← Kembali ke Beranda</a></div>';
        }

        /* ── Main panel ── */
        function initPanel() {
            if (API_URL === 'YOUR_APPS_SCRIPT_URL') {
                showSetupInstructions();
                return;
            }
            showLoading();
            fetchData();
        }

        function showSetupInstructions() {
            panel.innerHTML =
                '<h1 class="panel-title">🛡️ Admin Panel</h1>' +
                '<p class="panel-subtitle">Dashboard monitoring siswa Moklet Leadership</p>' +
                '<div class="setup-card">' +
                '<h2>⚠️ Backend Belum Dikonfigurasi</h2>' +
                '<p>Untuk mengaktifkan admin panel, setup Google Apps Script sebagai backend.</p>' +
                '<ol class="setup-steps">' +
                '<li>Buka <a href="https://docs.google.com/spreadsheets/create" target="_blank">Google Sheet baru</a></li>' +
                '<li>Klik <strong>Extensions → Apps Script</strong></li>' +
                '<li>Copy-paste kode dari file <code>_gas_backend.gs</code></li>' +
                '<li>Klik <strong>Deploy → New deployment</strong></li>' +
                '<li>Type: <strong>Web app</strong>, Execute as: <strong>Me</strong>, Access: <strong>Anyone</strong></li>' +
                '<li>Copy URL deployment</li>' +
                '<li>Paste di <code>config.js</code> → <code>APPS_SCRIPT_URL</code></li>' +
                '</ol></div>';
        }

        function showLoading() {
            panel.innerHTML =
                '<h1 class="panel-title">🛡️ Admin Panel</h1>' +
                '<p class="panel-subtitle">Memuat data siswa...</p>' +
                '<div class="empty-state"><div class="empty-icon">⏳</div><p>Fetching data dari server...</p></div>';
        }

        /* ── Fetch data ── */
        function fetchData() {
            fetch(API_URL)
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    allStudents = data;
                    renderDashboard();
                })
                .catch(function (err) {
                    panel.innerHTML =
                        '<h1 class="panel-title">🛡️ Admin Panel</h1>' +
                        '<p class="panel-subtitle">Dashboard monitoring siswa</p>' +
                        '<div class="empty-state"><div class="empty-icon">❌</div>' +
                        '<p>Gagal memuat data.<br><small style="color:rgba(255,255,255,.25)">' + err.message + '</small></p></div>';
                });
        }

        /* ── Render dashboard ── */
        function renderDashboard() {
            var total = allStudents.length;
            var withProfile = allStudents.filter(function (s) { return s.nama && s.kelas; }).length;

            /* Count per kelas */
            var kelasCount = {};
            allStudents.forEach(function (s) {
                if (s.kelas) { kelasCount[s.kelas] = (kelasCount[s.kelas] || 0) + 1; }
            });
            var topKelas = '—';
            var topCount = 0;
            for (var k in kelasCount) {
                if (kelasCount[k] > topCount) { topCount = kelasCount[k]; topKelas = k; }
            }
            var kelasList = Object.keys(kelasCount).sort();

            var html =
                '<h1 class="panel-title">🛡️ Admin Panel</h1>' +
                '<p class="panel-subtitle">Dashboard monitoring siswa Moklet Leadership</p>';

            /* Stats */
            html += '<div class="stats">' +
                '<div class="stat"><div class="stat-num">' + total + '</div><div class="stat-label">Total Login</div></div>' +
                '<div class="stat"><div class="stat-num">' + withProfile + '</div><div class="stat-label">Profil Lengkap</div></div>' +
                '<div class="stat"><div class="stat-num" style="font-size:1rem">' + topKelas + '</div><div class="stat-label">Kelas Terbanyak</div></div>' +
                '</div>';

            /* Toolbar */
            /* Tab bar */
            html += '<div class="tab-bar">' +
                '<button class="tab-btn active" onclick="switchTab(this,\'tabStudents\')" >📋 Data Siswa</button>' +
                '<button class="tab-btn" onclick="switchTab(this,\'tabCheckin\')" >📅 Check-In</button>' +
                '<button class="tab-btn" onclick="switchTab(this,\'tabRefleksi\');loadReflections()" >📝 Refleksi</button>' +
                '</div>';

            html += '<div id="tabStudents" class="tab-content active">';

            html += '<div class="toolbar">' +
                '<input class="search-input" id="searchInput" type="text" placeholder="🔍 Cari nama atau email..." oninput="filterTable()">' +
                '<select class="filter-select" id="filterKelas" onchange="filterTable()"><option value="">Semua Kelas</option>';
            kelasList.forEach(function (k) { html += '<option value="' + k + '">' + k + ' (' + kelasCount[k] + ')</option>'; });
            html += '</select>' +
                '<button class="refresh-btn" onclick="showLoading();fetchData()">🔄 Refresh</button>' +
                '<button class="export-btn" onclick="exportCSV()">📥 Export CSV</button></div>';

            /* Table */
            html += '<div class="table-wrap"><table class="data-table"><thead><tr>' +
                '<th>No</th><th class="avatar-cell"></th><th>Nama</th><th>Email</th>' +
                '<th>Kelas</th><th>Absen</th><th>Login Terakhir</th><th>Profil</th></tr></thead>' +
                '<tbody id="tableBody">';

            if (total === 0) {
                html += '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📭</div><p>Belum ada siswa yang login.</p></div></td></tr>';
            } else {
                allStudents.forEach(function (s, i) { html += buildRow(s, i); });
            }

            html += '</tbody></table></div>';
            html += '</div>'; /* close tabStudents */

            /* ── Tab: Check-In ── */
            html += '<div id="tabCheckin" class="tab-content">';
            html += '<div class="toolbar">' +
                '<button class="setting-btn" onclick="openCheckinModal()">➕ Tambah Jadwal Check-In</button>' +
                '<button class="refresh-btn" onclick="loadCheckinData()">🔄 Refresh</button></div>';
            html += '<div id="ciSettingsList"><div class="empty-state"><div class="empty-icon">⏳</div><p>Memuat jadwal check-in...</p></div></div>';
            html += '<h3 style="margin-top:24px;font-size:.95rem;color:#e2e8f0">📝 Log Check-In Siswa</h3>';
            html += '<div id="ciLogWrap" style="margin-top:10px"><div class="empty-state"><div class="empty-icon">⏳</div><p>Memuat log...</p></div></div>';
            html += '</div>'; /* close tabCheckin */

            /* ── Tab: Refleksi ── */
            html += '<div id="tabRefleksi" class="tab-content">';
            html += '<div class="toolbar">' +
                '<input class="search-input" id="refSearchInput" type="text" placeholder="🔍 Cari nama atau email..." oninput="filterReflections()">' +
                '<select class="filter-select" id="filterSesi" onchange="filterReflections()">' +
                '<option value="">Semua Sesi</option>' +
                '<option value="1">Sesi 1</option><option value="2">Sesi 2</option>' +
                '<option value="3">Sesi 3</option><option value="4">Sesi 4</option>' +
                '<option value="5">Sesi 5</option><option value="6">Sesi 6</option></select>' +
                '<button class="refresh-btn" onclick="loadReflections()">🔄 Refresh</button>' +
                '<button class="export-btn" onclick="exportReflCSV()">📥 Export CSV</button></div>';
            html += '<div id="refStats" style="margin-bottom:14px"></div>';
            html += '<div id="refTableWrap"><div class="empty-state"><div class="empty-icon">📝</div><p>Klik tab ini untuk memuat data refleksi.</p></div></div>';
            html += '</div>'; /* close tabRefleksi */

            panel.innerHTML = html;

            /* Auto-load check-in data */
            loadCheckinData();
        }

        function buildRow(s, i) {
            var initial = ((s.googleName || s.nama || '?')[0] || '?').toUpperCase();
            var avatar = s.picture
                ? '<img class="mini-avatar" src="' + s.picture + '" alt="" onerror="this.outerHTML=\'<div class=mini-avatar-fallback>' + initial + '</div>\'">'
                : '<div class="mini-avatar-fallback">' + initial + '</div>';
            var displayName = s.nama || s.googleName || '—';
            var kelas = s.kelas || '<span style="color:rgba(255,255,255,.2)">—</span>';
            var absen = s.absen || '<span style="color:rgba(255,255,255,.2)">—</span>';
            var lastLogin = s.lastLogin ? formatDate(s.lastLogin) : '—';
            var profileStatus = (s.nama && s.kelas && s.absen)
                ? '<span class="status-ok">✅</span>'
                : '<span class="status-no">❌</span>';

            return '<tr data-nama="' + (displayName).toLowerCase() + '" data-email="' + (s.email || '').toLowerCase() + '" data-kelas="' + (s.kelas || '') + '">' +
                '<td>' + (i + 1) + '</td>' +
                '<td class="avatar-cell">' + avatar + '</td>' +
                '<td><strong>' + displayName + '</strong></td>' +
                '<td style="font-size:.75rem;color:rgba(255,255,255,.4)">' + (s.email || '—') + '</td>' +
                '<td>' + kelas + '</td>' +
                '<td style="text-align:center">' + absen + '</td>' +
                '<td style="font-size:.72rem;color:rgba(255,255,255,.35)">' + lastLogin + '</td>' +
                '<td style="text-align:center">' + profileStatus + '</td></tr>';
        }

        function formatDate(iso) {
            try {
                var d = new Date(iso);
                return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }) + ' ' +
                    d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            } catch (e) { return iso; }
        }

        /* ── Filter ── */
        function filterTable() {
            var q = document.getElementById('searchInput').value.toLowerCase();
            var kelas = document.getElementById('filterKelas').value;
            var rows = document.querySelectorAll('#tableBody tr[data-nama]');
            rows.forEach(function (row) {
                var matchQ = !q || row.dataset.nama.indexOf(q) > -1 || row.dataset.email.indexOf(q) > -1;
                var matchK = !kelas || row.dataset.kelas === kelas;
                row.style.display = (matchQ && matchK) ? '' : 'none';
            });
        }

        /* ── Export CSV ── */
        function exportCSV() {
            if (!allStudents.length) return;
            var csv = 'No,Nama,Email,Kelas,No Absen,Google Name,Login Terakhir,Profil Updated\n';
            allStudents.forEach(function (s, i) {
                csv += (i + 1) + ',' +
                    '"' + (s.nama || '').replace(/"/g, '""') + '",' +
                    '"' + (s.email || '') + '",' +
                    '"' + (s.kelas || '') + '",' +
                    (s.absen || '') + ',' +
                    '"' + (s.googleName || '') + '",' +
                    '"' + (s.lastLogin || '') + '",' +
                    '"' + (s.profileUpdated || '') + '"\n';
            });
            var blob = new Blob([csv], { type: 'text/csv' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'molesh_students_' + new Date().toISOString().slice(0, 10) + '.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        /* ── Tab switcher ── */
        function switchTab(btn, tabId) {
            document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
            document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active')});
            btn.classList.add('active');
            var tab = document.getElementById(tabId);
            if (tab) tab.classList.add('active');
        }

        /* ══════════════════════════════════════
           CHECK-IN MANAGEMENT
           ══════════════════════════════════════ */
        var ciSettings = [];
        var ciLogs = [];

        function openCheckinModal() {
            document.getElementById('ciModal').classList.add('show');
            document.getElementById('ciTanggal').value = new Date().toISOString().slice(0,10);
            document.getElementById('ciDeskripsi').value = '';
            document.getElementById('ciStatus').value = 'aktif';
        }
        function closeCheckinModal() {
            document.getElementById('ciModal').classList.remove('show');
        }

        function saveCheckinSetting() {
            var tanggal = document.getElementById('ciTanggal').value;
            var deskripsi = document.getElementById('ciDeskripsi').value;
            var status = document.getElementById('ciStatus').value;
            if (!tanggal) { alert('Tanggal wajib diisi!'); return; }

            var payload = JSON.stringify({ action: 'saveCheckinSetting', tanggal: tanggal, deskripsi: deskripsi, status: status });
            fetch(API_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body: payload })
                .then(function(){
                    closeCheckinModal();
                    /* Wait a moment for GAS to process, then reload */
                    setTimeout(function(){ loadCheckinData(); }, 1500);
                })
                .catch(function(err){ alert('Gagal menyimpan: ' + err.message); });
        }

        function deleteCheckinSetting(id) {
            if (!confirm('Yakin hapus jadwal check-in ini?')) return;
            var payload = JSON.stringify({ action: 'deleteCheckinSetting', id: id });
            fetch(API_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body: payload })
                .then(function(){
                    setTimeout(function(){ loadCheckinData(); }, 1500);
                })
                .catch(function(err){ alert('Gagal menghapus: ' + err.message); });
        }

        function loadCheckinData() {
            var settingsEl = document.getElementById('ciSettingsList');
            var logEl = document.getElementById('ciLogWrap');
            if (!settingsEl) return;

            /* Fetch settings */
            fetch(API_URL + '?type=checkinSettings')
                .then(function(r){ return r.json(); })
                .then(function(data){
                    ciSettings = data;
                    renderCheckinSettings(settingsEl);
                })
                .catch(function(){ settingsEl.innerHTML = '<div class="empty-state"><p>❌ Gagal memuat settings</p></div>'; });

            /* Fetch log */
            fetch(API_URL + '?type=checkinLog')
                .then(function(r){ return r.json(); })
                .then(function(data){
                    ciLogs = data;
                    renderCheckinLog(logEl);
                })
                .catch(function(){ logEl.innerHTML = '<div class="empty-state"><p>❌ Gagal memuat log</p></div>'; });
        }

        function renderCheckinSettings(el) {
            if (!ciSettings.length) {
                el.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><p>Belum ada jadwal check-in.</p></div>';
                return;
            }
            /* Count logs per checkinId */
            var logCount = {};
            ciLogs.forEach(function(l){ logCount[l.checkinId] = (logCount[l.checkinId]||0)+1; });

            var html = '<div class="ci-cards">';
            ciSettings.forEach(function(s){
                var tanggal = s.tanggal;
                if (tanggal instanceof Date || (typeof tanggal === 'string' && tanggal.indexOf('T') > -1)) {
                    try { tanggal = new Date(tanggal).toISOString().slice(0,10); } catch(e){}
                }
                var statusClass = s.status === 'aktif' ? 'ci-status-aktif' : 'ci-status-nonaktif';
                var count = logCount[s.id] || 0;
                html += '<div class="ci-card">' +
                    '<div><div class="ci-date">' + formatTanggal(tanggal) + '</div>' +
                    '<div class="ci-count">' + count + ' siswa check-in</div></div>' +
                    '<div class="ci-desc">' + (s.deskripsi || '—') + '</div>' +
                    '<span class="ci-status ' + statusClass + '">' + s.status + '</span>' +
                    '<button class="ci-del" onclick="deleteCheckinSetting(\'' + s.id + '\')">🗑️</button>' +
                    '</div>';
            });
            html += '</div>';
            el.innerHTML = html;
        }

        function renderCheckinLog(el) {
            if (!ciLogs.length) {
                el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>Belum ada siswa yang check-in.</p></div>';
                return;
            }
            var html = '<div class="table-wrap"><table class="data-table"><thead><tr>' +
                '<th>No</th><th>Tanggal</th><th>Deskripsi</th><th>Nama</th><th>Email</th><th>Kelas</th><th>Absen</th><th>Waktu Check-In</th>' +
                '</tr></thead><tbody>';
            ciLogs.forEach(function(l, i){
                html += '<tr>' +
                    '<td>' + (i+1) + '</td>' +
                    '<td style="white-space:nowrap">' + (l.tanggal || '—') + '</td>' +
                    '<td style="font-size:.75rem;color:rgba(255,255,255,.4)">' + (l.deskripsi || '—') + '</td>' +
                    '<td><strong>' + (l.nama || l.googleName || '—') + '</strong></td>' +
                    '<td style="font-size:.75rem;color:rgba(255,255,255,.4)">' + (l.email||'—') + '</td>' +
                    '<td>' + (l.kelas||'—') + '</td>' +
                    '<td style="text-align:center">' + (l.absen||'—') + '</td>' +
                    '<td style="font-size:.72rem;color:rgba(255,255,255,.35)">' + (l.checkinTime ? formatDate(l.checkinTime) : '—') + '</td>' +
                    '</tr>';
            });
            html += '</tbody></table></div>';
            el.innerHTML = html;
        }

        /* ══════════════════════════════════════
           REFLECTIONS MANAGEMENT
           ══════════════════════════════════════ */
        var allReflections = [];
        var _refLoaded = false;

        function loadReflections() {
            var wrap = document.getElementById('refTableWrap');
            var stats = document.getElementById('refStats');
            if (!wrap) return;
            wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><p>Memuat data refleksi...</p></div>';

            fetch(API_URL + '?type=reflections')
                .then(function(r){ return r.json(); })
                .then(function(data){
                    allReflections = data;
                    _refLoaded = true;
                    renderRefStats(stats);
                    renderReflections(wrap);
                })
                .catch(function(err){
                    wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><p>Gagal memuat: ' + err.message + '</p></div>';
                });
        }

        function renderRefStats(el) {
            if (!el) return;
            var total = allReflections.length;
            var perSesi = {};
            allReflections.forEach(function(r){ perSesi[r.sesi] = (perSesi[r.sesi]||0)+1; });
            var html = '<div class="stats" style="grid-template-columns:repeat(auto-fit,minmax(100px,1fr))">';
            html += '<div class="stat"><div class="stat-num">' + total + '</div><div class="stat-label">Total Refleksi</div></div>';
            for (var i = 1; i <= 6; i++) {
                html += '<div class="stat"><div class="stat-num">' + (perSesi[i]||perSesi[''+i]||0) + '</div><div class="stat-label">Sesi ' + i + '</div></div>';
            }
            html += '</div>';
            el.innerHTML = html;
        }

        function renderReflections(el) {
            if (!allReflections.length) {
                el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>Belum ada refleksi yang masuk.</p></div>';
                return;
            }
            var html = '<div class="table-wrap"><table class="data-table" id="refTable"><thead><tr>' +
                '<th>No</th><th>Sesi</th><th>Nama</th><th>Email</th><th>Kelas</th><th>Absen</th><th>Refleksi</th><th>Waktu</th>' +
                '</tr></thead><tbody id="refTableBody">';
            allReflections.forEach(function(r, i){
                html += '<tr data-sesi="' + (r.sesi||'') + '" data-nama="' + (r.nama||r.googleName||'').toLowerCase() + '" data-email="' + (r.email||'').toLowerCase() + '">' +
                    '<td>' + (i+1) + '</td>' +
                    '<td style="text-align:center;font-weight:700;color:#c4b5fd">' + (r.sesi||'—') + '</td>' +
                    '<td><strong>' + (r.nama||r.googleName||'—') + '</strong></td>' +
                    '<td style="font-size:.75rem;color:rgba(255,255,255,.4)">' + (r.email||'—') + '</td>' +
                    '<td>' + (r.kelas||'—') + '</td>' +
                    '<td style="text-align:center">' + (r.absen||'—') + '</td>' +
                    '<td style="max-width:280px;font-size:.78rem;line-height:1.5;color:#cbd5e1">' + escHtml(r.refleksi||'—') + '</td>' +
                    '<td style="font-size:.72rem;color:rgba(255,255,255,.35);white-space:nowrap">' + (r.submittedAt ? formatDate(r.submittedAt) : '—') + '</td>' +
                    '</tr>';
            });
            html += '</tbody></table></div>';
            el.innerHTML = html;
        }

        function escHtml(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function filterReflections() {
            var q = (document.getElementById('refSearchInput')||{}).value;
            q = q ? q.toLowerCase() : '';
            var sesi = (document.getElementById('filterSesi')||{}).value;
            var rows = document.querySelectorAll('#refTableBody tr');
            rows.forEach(function(row){
                var matchQ = !q || (row.dataset.nama||'').indexOf(q) > -1 || (row.dataset.email||'').indexOf(q) > -1;
                var matchS = !sesi || row.dataset.sesi === sesi;
                row.style.display = (matchQ && matchS) ? '' : 'none';
            });
        }

        function exportReflCSV() {
            if (!allReflections.length) return;
            var csv = 'No,Sesi,Nama,Email,Kelas,Absen,Refleksi,Waktu\n';
            allReflections.forEach(function(r, i){
                csv += (i+1) + ',' +
                    (r.sesi||'') + ',' +
                    '"' + (r.nama||r.googleName||'').replace(/"/g,'""') + '",' +
                    '"' + (r.email||'') + '",' +
                    '"' + (r.kelas||'') + '",' +
                    (r.absen||'') + ',' +
                    '"' + (r.refleksi||'').replace(/"/g,'""').replace(/\n/g,' ') + '",' +
                    '"' + (r.submittedAt||'') + '"\n';
            });
            var blob = new Blob([csv], {type:'text/csv'});
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'molesh_refleksi_' + new Date().toISOString().slice(0,10) + '.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        function formatTanggal(str) {
            try {
                var parts = str.split('-');
                var d = new Date(parts[0], parts[1]-1, parts[2]);
                return d.toLocaleDateString('id-ID', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
            } catch(e){ return str; }
        }

        /* ── Init ── */
        if (checkAdmin()) {
            initPanel();
        }
    </script>

    <!-- Check-In Setting Modal -->
    <div class="modal-overlay" id="ciModal">
        <div class="modal">
            <h3>📅 Tambah Jadwal Check-In</h3>
            <p>Atur tanggal check-in untuk siswa. Siswa hanya bisa check-in pada tanggal yang aktif.</p>
            <label>Tanggal</label>
            <input type="date" id="ciTanggal">
            <label>Deskripsi (opsional)</label>
            <input type="text" id="ciDeskripsi" placeholder="Misal: Pertemuan Sesi 1">
            <label>Status</label>
            <select id="ciStatus">
                <option value="aktif">✅ Aktif</option>
                <option value="nonaktif">⏸️ Nonaktif</option>
            </select>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeCheckinModal()">Batal</button>
                <button class="btn-primary" onclick="saveCheckinSetting()">💾 Simpan</button>
            </div>
        </div>
    </div>
</body>
</html>
