<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kumpulan modul Leadership & Softskill Sadari-Peduli-Berani untuk siswa Moklet.">
    <meta name="theme-color" content="#667eea">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Moklet Leadership - Modul Leadership & Softskill">
    <meta property="og:description" content="Sadari, Peduli, Berani: modul Leadership & Softskill siap pakai untuk pembinaan siswa Moklet.">
    <meta property="og:url" content="https://hadhiee.github.io/MoLeS/">
    <meta property="og:image" content="https://hadhiee.github.io/MoLeS/assets/og-card.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="Moklet Leadership">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Moklet Leadership">
    <meta name="twitter:description" content="Modul Leadership & Softskill Sadari-Peduli-Berani untuk siswa Moklet.">
    <meta name="twitter:image" content="https://hadhiee.github.io/MoLeS/assets/og-card.png">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Moklet Leadership</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}

        body{
            min-height:100vh;
            font-family:'Plus Jakarta Sans',system-ui,sans-serif;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            background:#0b0b1a;
            color:#e2e8f0;
            padding:24px;
            overflow:hidden;
            position:relative;
        }

        /* animated gradient blobs */
        .blob{position:fixed;border-radius:50%;filter:blur(100px);opacity:.4;z-index:0;will-change:transform}
        .blob-1{width:480px;height:480px;background:#7c3aed;top:-15%;left:-10%;animation:drift 10s ease-in-out infinite alternate}
        .blob-2{width:360px;height:360px;background:#06b6d4;bottom:-10%;right:-8%;animation:drift 12s ease-in-out infinite alternate-reverse}
        .blob-3{width:260px;height:260px;background:#f43f5e;top:40%;left:55%;animation:drift 14s ease-in-out infinite alternate}
        @keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(30px,20px) scale(1.08)}}

        /* card */
        .card{
            position:relative;z-index:1;
            width:100%;max-width:480px;
            background:rgba(255,255,255,.06);
            backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,.1);
            border-radius:28px;
            padding:48px 32px 40px;
            text-align:center;
            animation:pop .7s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes pop{from{opacity:0;transform:translateY(32px) scale(.95)}to{opacity:1;transform:none}}

        .icon{
            width:80px;height:80px;margin:0 auto 22px;
            background:linear-gradient(135deg,#7c3aed,#06b6d4);
            border-radius:22px;display:grid;place-items:center;
            font-size:36px;
            box-shadow:0 8px 32px rgba(124,58,237,.45);
        }

        .tag{
            display:inline-block;
            background:rgba(124,58,237,.2);color:#c4b5fd;
            font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;
            padding:5px 16px;border-radius:50px;margin-bottom:16px;
        }

        h1{
            font-size:2.1rem;font-weight:800;line-height:1.15;margin-bottom:12px;
            background:linear-gradient(90deg,#fff 30%,#7dd3fc);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            background-clip:text;
        }

        .desc{
            font-size:.95rem;line-height:1.7;
            color:rgba(255,255,255,.55);margin-bottom:8px;
        }

        /* pillar pills */
        .pills{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:20px 0 28px}
        .pill{
            display:flex;align-items:center;gap:5px;
            background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);
            border-radius:50px;padding:7px 16px;
            font-size:.82rem;font-weight:600;color:#cbd5e1;
            transition:background .2s;
        }
        .pill:hover{background:rgba(255,255,255,.14)}

        /* CTA */
        .cta{
            display:inline-flex;align-items:center;gap:10px;
            text-decoration:none;
            background:linear-gradient(135deg,#7c3aed,#06b6d4);
            color:#fff;
            padding:14px 36px;border-radius:16px;
            font-size:.95rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
            box-shadow:0 6px 28px rgba(124,58,237,.45);
            transition:transform .18s,box-shadow .18s;
        }
        .cta:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(124,58,237,.55)}
        .cta:active{transform:translateY(0)}
        .cta svg{width:18px;height:18px;fill:currentColor;transition:transform .18s}
        .cta:hover svg{transform:translateX(4px)}

        .footer{margin-top:26px;font-size:.7rem;color:rgba(255,255,255,.25)}

        @media(max-width:480px){
            .card{padding:36px 20px 30px;border-radius:22px}
            h1{font-size:1.7rem}
            .cta{padding:13px 26px;font-size:.88rem}
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <main class="card">
        <div class="icon">🎓</div>
        <span class="tag">Leadership &amp; Softskill</span>
        <h1>Moklet Leadership</h1>
        <p class="desc">Modul <strong style="color:#c4b5fd">Leadership</strong> &amp; <strong style="color:#7dd3fc">Softskill</strong> siswa Moklet — ringkas, praktis, siap dipelajari kapan saja.</p>

        <div class="pills">
            <span class="pill">💡 Sadari</span>
            <span class="pill">🤝 Peduli</span>
            <span class="pill">🔥 Berani</span>
        </div>

        <a class="cta" href="presentasi.html">
            BUKA MATERI
            <svg viewBox="0 0 20 20"><path d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"/></svg>
        </a>

        <p class="footer">© 2026 Moklet Leadership</p>
    </main>
</body>
</html>
